name: 'Update diff library'

on:
    schedule:
        - cron: '0 0 * * 0'
    workflow_dispatch:

permissions:
    contents: write
    actions: write

jobs:
    update-diff:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
            - name: Set Node Version
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run Update Script
              run: pnpm tsx scripts/run.ts --mode=update-diff
              env:
                  GITHUB_TOKEN: ${{ github.token }}
            - name: Check for Changes
              id: check
              run: |
                  git fetch origin main
                  if git diff --name-only HEAD..origin/main | grep -q "Gadget-libDiff.js"; then
                      echo "updated=true" >> "$GITHUB_OUTPUT"
                  fi
            - name: Trigger Deploy
              if: steps.check.outputs.updated == 'true'
              run: |
                  MESSAGE=$(git log origin/main -1 --format="%s")
                  AUTHOR=$(git log origin/main -1 --format="%an <%ae>")
                  gh workflow run deploy.yaml --ref main \
                      -f "message=$MESSAGE" \
                      -f "author=$AUTHOR"
              env:
                  GH_TOKEN: ${{ github.token }}
